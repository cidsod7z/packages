name: Build ARM64
concurrency:
  group: master-arm64-build
'on':
  push:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - run: mkdir build
    - name: "Download meta \U0001F527"
      uses: luet-lab/luet-github-action@v0.3.1
      with:
        FINAL_REPO: quay.io/kairos/packages-arm64
        REPOSITORY_TYPE: docker
        downloadAllMeta: true
        downloadFromList: false
        downloadMeta: true
        luetArch: arm64
        luetVersion: 0.36.0
    - name: "Build packages \U0001F527"
      uses: luet-lab/luet-github-action@v0.3.1
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      with:
        build: true
        fromIndex: true
        onlyMissing: true
        FINAL_REPO: quay.io/kairos/packages-arm64
        DOCKER_USERNAME: ${{ secrets.QUAY_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        DOCKER_ENDPOINT: quay.io
        REPOSITORY_TYPE: docker
        pushFinalImages: true
        pushCache: true
        values: values/arm64.yaml
        buildx: true
        platform: linux/arm64
        luetArch: arm64
        luetVersion: 0.36.0
    - name: "Create repo \U0001F527"
      uses: luet-lab/luet-github-action@v0.3.1
      id: create_repo
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      with:
        FINAL_REPO: quay.io/kairos/packages-arm64
        DOCKER_USERNAME: ${{ secrets.QUAY_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        DOCKER_ENDPOINT: quay.io
        REPOSITORY_TYPE: docker
        createRepo: true
        pushCache: true
        revisionSHA: true
        luetArch: arm64
        luetVersion: 0.36.0
    - name: Summary info
      run: 'echo "Repo created at quay.io/kairos/packages-arm64:${{ steps.create_repo.outputs.LUET_PUSHED_REPO
        }}-repository.yaml" >> $GITHUB_STEP_SUMMARY

        '
